<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="section">
      <div id="search-box">
        <input type="text" id="enter-city" />
        <button id="search">
          <img src="images/search.png" alt="search icon" id="searchicon" />
        </button>
      </div>
      <div id="weather-icon">
        <img src="images/clear.png" id="weather-img" />
       <div id="tempBox"><p id="temp">1</p><span>°C</span></div> 
        <p id="city-name">Berlin</p>
      </div>
      <div id="bottom-section">
        <div id="humidity">
          <img src="images/humidity.png" alt="humidity" id="humidity-icon" />
          <div class="details">
            <h2 id="humidity-value">12%</h2>
            <h3>Humidity</h3>
          </div>
        </div>
        <div id="wind-speed">
          <img src="images/wind.png" alt="wind speed" id="wind-speed-icon" />
          <div class="details">
            <h2 id="wind-speed-value">233 km/h</h2>
            <h3>Wind Speed</h3>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
